name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"] # O la rama que uses como principal
  workflow_dispatch: # Esto nos deja correr el action a mano si queremos

# Permisos necesarios para subir a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permitimos que solo corra un deploy a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Definimos el working-directory porque tu app de Vite está en la carpeta 'frontend'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Podés ajustarlo según la versión que uses
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Instalar dependencias
        run: npm ci

      - name: Build con Vite
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Subimos la carpeta 'dist' que genera Vite adentro de 'frontend'
          path: './frontend/dist'

  deploy:
    name: Deploy a GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
