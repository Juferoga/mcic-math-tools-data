services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mmkk-backend
    hostname: mmkk-backend
    ports:
      - '8000:8000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mmkk-frontend
    hostname: mmkk-frontend
    ports:
      - '0.0.0.0:5173:80'
    restart: unless-stopped
    depends_on:
      - backend
